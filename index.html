<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Zhenyang Wu</title>
  <link rel="icon" href="/favicon.svg" type="image/svg+xml">

  <style>
    /* If you self-host the font, replace this @import with @font-face.
       Kept here for easy preview. */
    @import url('https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:ital,wght@0,200;0,300;0,400;1,200&display=swap');

    :root {
      --bg: #ffffff;
      --text: #111111;
      --muted: #666666;
      --col: 140px; /* right-side column width (directory feel) */
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      background: var(--bg);
      color: var(--text);
      font-family: "IBM Plex Mono", ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", "Courier New", monospace;
      font-weight: 200;
      letter-spacing: 0.01em;
      line-height: 1.35;
      font-synthesis: none;
    }

    a { color: inherit; text-decoration: none; }

    /* Full-width layout; padding follows screen size */
    .wrap {
      width: 100%;
      padding: clamp(24px, 4vw, 64px) clamp(18px, 5vw, 96px) clamp(56px, 6vw, 90px);
    }

    /* Fixed corner elements */
    .fixed-tl {
      position: fixed;
      top: clamp(12px, 2vw, 28px);
      left: clamp(12px, 2vw, 28px);
      z-index: 50;
      pointer-events: none; /* purely informational */
    }

    .fixed-br {
      position: fixed;
      right: clamp(12px, 2vw, 28px);
      bottom: clamp(12px, 2vw, 28px);
      z-index: 50;
      pointer-events: none;
      text-align: right;
    }

    /* Two-column system: left content + fixed right column */
    header {
      display: block;
      width: auto;
    }

        .note {
      font-size: 0.78rem;
      color: var(--muted);
      letter-spacing: 0.10em;
      text-transform: none;
      text-align: left;
      white-space: nowrap;
      font-style: italic;
    }

    .hero {
      padding: 52px 0 8px;
    }

    h1 {
      margin: 0;
      font-size: clamp(1.65rem, 3.2vw, 3.1rem);
      letter-spacing: -0.04em;
      line-height: 0.98;
      font-weight: 200;
    }

    /* Directory list (no boxes) */
    .nav {
      margin-top: 18px;
      display: grid;
      grid-template-columns: 1fr;
      gap: 8px;
      width: 100%;
    }

    .item {
      display: grid;
      grid-template-columns: 1fr var(--col);
      align-items: baseline;
      gap: 16px;
      padding: 6px 0;
      width: 100%;
    }

    .left { min-width: 0; }

    .title::before {
      content: "-";
      position: absolute;
      left: 0;
      top: 0;
      color: var(--muted);
    }

    .title {
      position: relative;
      padding-left: 14px;
      font-size: 1.00rem;
      letter-spacing: 0.02em;
      font-weight: 200;
    }

    .num {
      font-size: 0.76rem;
      color: var(--muted);
      letter-spacing: 0.16em;
      text-transform: none;
      text-align: right;
      white-space: nowrap;
      font-weight: 200;
    }

    /* Subtle system-directory behavior: underline only */
    .item:hover .title {
      text-decoration: underline;
      text-decoration-thickness: 1px;
      text-underline-offset: 4px;
    }

    footer {
      margin: 0;
      color: var(--muted);
      font-size: 0.85rem;
      width: auto;
    }

    
    footer a {
      text-decoration: underline;
      text-decoration-thickness: 1px;
      text-underline-offset: 3px;
    }

    footer a:hover { color: var(--text); }

    @media (max-width: 720px) {
      :root { --col: 92px; }
    }

    @media (max-width: 560px) {
      :root { --col: 92px; }
      .note { white-space: normal; }
    }
      .note, .num {
        text-align: left;
        white-space: normal;
      }
      footer { text-align: left; }
    }
  </style>
</head>
<body>
  <div class="wrap">
    <header class="fixed-tl">
      <div class="note">A trace remains</div>
    </header>

    <section class="hero">
      <h1>Zhenyang Wu</h1>
      <p class="subtitle">Visual practice.<br><em>书不尽言，言不尽意。</em><br><em>Words cannot fully convey meaning.</em></p>
    </section>

    <nav class="nav" aria-label="Site navigation">
      <a class="item" href="works.html" aria-label="Works">
        <div class="left">
          <div class="title">Works</div>
        </div>
        <div class="num">01</div>
      </a>

      <a class="item" href="bio.html" aria-label="Bio">
        <div class="left">
          <div class="title">Bio</div>
        </div>
        <div class="num">02</div>
      </a>

      <a class="item" href="contact.html" aria-label="Contact">
        <div class="left">
          <div class="title">Contact</div>
        </div>
        <div class="num">03</div>
      </a>
    </nav>

    <footer class="fixed-br">
      <div>© 2026 Zhenyang Wu</div>
    </footer>
  </div>
</body>
</html>
