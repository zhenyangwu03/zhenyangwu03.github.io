<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Contact — Zhenyang Wu</title>

  <style>
    @import url('https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:ital,wght@0,200;0,300;0,400;1,200&display=swap');

    :root{
      --bg:#fff;
      --text:#111;
      --muted:#666;
      --read:#4d4d4d;
      --rule: rgba(0,0,0,0.10);
      --left-col: 220px;
      --label-col: 140px;
    }

    *{ box-sizing:border-box; }

    html, body{
      margin:0;
      background:var(--bg);
      color:var(--text);
      font-family:"IBM Plex Mono", ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono","Courier New", monospace;
      font-weight:200;
      letter-spacing:0.01em;
      line-height:1.55;
      font-synthesis:none;
    }

    a{ color:inherit; text-decoration:none; }

    .wrap{
      width:100%;
      padding: clamp(24px, 4vw, 64px) clamp(18px, 5vw, 96px) clamp(56px, 6vw, 90px);
    }

    /* fixed corners */
    .fixed-tl{
      position:fixed;
      top: clamp(12px, 2vw, 28px);
      left: clamp(12px, 2vw, 28px);
      z-index:50;
      pointer-events:auto;
      font-size:0.78rem;
      color:var(--muted);
      letter-spacing:0.10em;
      font-style: italic;
      white-space:nowrap;
      font-weight:200;
    }
    .fixed-tl:hover{ color: var(--text); }

    .fixed-br{
      position:fixed;
      right: clamp(12px, 2vw, 28px);
      bottom: clamp(12px, 2vw, 28px);
      z-index:50;
      pointer-events:none;
      text-align:right;
      color:var(--muted);
      font-size:0.85rem;
      white-space:nowrap;
      font-weight:200;
    }

    /* top layout */
    .top{
      margin-top: 52px;
      display:grid;
      grid-template-columns: var(--left-col) 1fr;
      gap: 44px;
      align-items:start;
      max-width: 1100px;
    }

    h1{
      margin:0;
      font-size: clamp(2.1rem, 5vw, 3.1rem);
      line-height: 0.95;
      letter-spacing: -0.04em;
      font-weight: 200;
    }

    .contact-text{
      max-width: 560px;
      font-size: 1rem;
      color: var(--read);
      font-weight: 300;
      line-height: 1.7;
    }

    /* table */
    .table{
      margin-top: 26px;
      max-width: 760px;
      margin-left: calc(var(--left-col) + 44px);
      border-top: 1px solid var(--rule);
    }

    .row{
      display:grid;
      grid-template-columns: var(--label-col) 1fr;
      gap: 20px;
      padding: 10px 0;
      border-bottom: 1px solid var(--rule);
      font-size: 0.85rem;
    }

    .k{
      color: var(--muted);
      white-space: nowrap;
      letter-spacing: 0.06em;
      font-weight: 200;
    }

    .v{
      color: var(--read);
      font-weight: 300;
      min-width: 0;
    }

    .v .line + .line{ margin-top: 6px; }

    /* link behavior: no underline, subtle hover */
    .link{
      color: inherit;
      text-decoration: none;
    }
    .link:hover{
      color: var(--text);
    }

    @media (max-width: 900px){
      :root{ --left-col: 180px; }
      .top{ gap: 28px; }
      .table{ margin-left: calc(var(--left-col) + 28px); }
    }

    @media (max-width: 640px){
      .top{
        grid-template-columns: 1fr;
        gap: 18px;
      }
      .table{
        margin-left: 0;
        max-width: 100%;
      }
      .row{
        grid-template-columns: 1fr;
        gap: 8px;
      }
      .fixed-br{ text-align:left; }
    }
  </style>
</head>

<body>
  <a class="fixed-tl" href="index.html" aria-label="Back to index">Back to index</a>
  <div class="fixed-br">© 2026 Zhenyang Wu</div>

  <div class="wrap">
    <section class="top">
      <h1>Contact</h1>
      <div class="contact-text">
        For inquiries, collaborations, or portfolio requests, please reach out.
      </div>
    </section>

    <section class="table" aria-label="Contact details">
      <div class="row">
        <div class="k">Email</div>
        <div class="v">
          <a class="link" href="mailto:zhenyang_wu@outlook.com">zhenyang_wu@outlook.com</a>
        </div>
      </div>

      <div class="row">
        <div class="k">Phone</div>
        <div class="v">
          <div class="line">+1 914 612 3693</div>
          <div class="line">+86 177 1754 0170</div>
        </div>
      </div>

      <div class="row">
        <div class="k">Instagram</div>
        <div class="v">
          <a class="link" href="https://www.instagram.com/wu_ooer/" target="_blank" rel="noopener">wu_ooer</a>
        </div>
      </div>
    </section>
  </div>
</body>
</html>
